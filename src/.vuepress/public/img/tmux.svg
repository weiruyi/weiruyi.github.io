<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background terminal window -->
  <rect width="128" height="128" rx="12" fill="#1d1f21"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="128" height="22" rx="12" fill="#2d2f31"/>
  <rect x="0" y="12" width="128" height="10" fill="#2d2f31"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="11" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="11" r="5" fill="#febc2e"/>
  <circle cx="50" cy="11" r="5" fill="#28c840"/>
  <!-- Vertical divider (split pane) -->
  <rect x="63" y="22" width="2" height="106" fill="#4a4a4a"/>
  <!-- Horizontal divider in right pane -->
  <rect x="65" y="74" width="63" height="2" fill="#4a4a4a"/>
  <!-- Left pane - green cursor/text lines -->
  <rect x="10" y="33" width="32" height="3" rx="1.5" fill="#4ec94e" opacity="0.9"/>
  <rect x="10" y="42" width="22" height="3" rx="1.5" fill="#4ec94e" opacity="0.6"/>
  <rect x="10" y="51" width="28" height="3" rx="1.5" fill="#4ec94e" opacity="0.6"/>
  <rect x="10" y="60" width="18" height="3" rx="1.5" fill="#4ec94e" opacity="0.6"/>
  <rect x="10" y="69" width="25" height="3" rx="1.5" fill="#4ec94e" opacity="0.6"/>
  <rect x="10" y="78" width="20" height="3" rx="1.5" fill="#4ec94e" opacity="0.6"/>
  <!-- Blinking cursor in left pane -->
  <rect x="10" y="90" width="8" height="10" rx="1" fill="#4ec94e" opacity="0.9"/>
  <!-- Right top pane - blue text lines -->
  <rect x="73" y="33" width="24" height="3" rx="1.5" fill="#5b9bd5" opacity="0.9"/>
  <rect x="73" y="42" width="40" height="3" rx="1.5" fill="#5b9bd5" opacity="0.6"/>
  <rect x="73" y="51" width="30" height="3" rx="1.5" fill="#5b9bd5" opacity="0.6"/>
  <rect x="73" y="60" width="36" height="3" rx="1.5" fill="#5b9bd5" opacity="0.6"/>
  <!-- Right bottom pane - yellow text lines -->
  <rect x="73" y="84" width="28" height="3" rx="1.5" fill="#e6c447" opacity="0.9"/>
  <rect x="73" y="93" width="36" height="3" rx="1.5" fill="#e6c447" opacity="0.6"/>
  <rect x="73" y="102" width="20" height="3" rx="1.5" fill="#e6c447" opacity="0.6"/>
  <!-- Status bar at bottom -->
  <rect x="0" y="112" width="128" height="16" rx="0" fill="#2d9e2d"/>
  <rect x="0" y="112" width="128" height="16" fill="#2d9e2d"/>
  <rect x="0" y="120" width="128" height="8" rx="0" fill="#2d9e2d"/>
  <rect x="0" y="116" width="128" height="12" rx="0" fill="#2d9e2d"/>
  <!-- Round bottom corners of status bar -->
  <rect x="0" y="116" width="128" height="12" fill="#2d9e2d"/>
  <path d="M0 116 h128 v8 q0 4 -4 4 H4 q-4 0 -4 -4 Z" fill="#2d9e2d"/>
  <!-- Status bar text indicators -->
  <rect x="6" y="119" width="20" height="4" rx="2" fill="#1a6e1a" opacity="0.8"/>
  <rect x="32" y="119" width="14" height="4" rx="2" fill="#1a6e1a" opacity="0.6"/>
  <rect x="96" y="119" width="26" height="4" rx="2" fill="#1a6e1a" opacity="0.6"/>
</svg>
